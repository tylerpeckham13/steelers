<!DOCTYPE html>
<html>
<head>
    <title>Steelers Trivia Game</title>
    <style>
        body {
            font-family: Arial;
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: gold;
        }

        .game-box {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
        }

        button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            background-color: gold;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #ffd700;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🏈 Steelers Trivia Game</h1>

<div class="game-box">
    <h2 id="question">Question goes here</h2>

    <div id="answers"></div>

    <p id="result"></p>
    <p id="score">Score: 0</p>
</div>

<script>
const questions = [
    {
        question: "How many Super Bowls have the Steelers won?",
        answers: ["4", "6", "8", "5"],
        correct: 1
    },
    {
        question: "Who is the Steelers all-time sack leader?",
        answers: ["James Harrison", "T.J. Watt", "Mean Joe Greene", "LaMarr Woodley"],
        correct: 0
    },
    {
        question: "What year were the Steelers founded?",
        answers: ["1925", "1933", "1940", "1955"],
        correct: 1
    },
    {
        question: "What are the Steelers team colors?",
        answers: ["Red & Black", "Blue & White", "Black & Gold", "Green & Yellow"],
        correct: 2
    },
    {
        question: "What stadium do the Steelers play in?",
        answers: ["Heinz Field", "Lambeau Field", "AT&T Stadium", "MetLife Stadium"],
        correct: 0
    }
];

let currentQuestion = 0;
let score = 0;

function loadQuestion() {
    const q = questions[currentQuestion];
    document.getElementById("question").innerText = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.innerText = answer;
        btn.onclick = () => checkAnswer(index);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(index) {
    const correct = questions[currentQuestion].correct;
    const result = document.getElementById("result");

    if (index === correct) {
        result.innerText = "✅ Correct!";
        score++;
    } else {
        result.innerText = "❌ Wrong!";
    }

    document.getElementById("score").innerText = "Score: " + score;

    currentQuestion++;

    if (currentQuestion < questions.length) {
        setTimeout(loadQuestion, 1000);
    } else {
        setTimeout(() => {
            document.querySelector(".game-box").innerHTML = `
                <h2>Game Over!</h2>
                <p>Your final score: ${score}/${questions.length}</p>
                <button onclick="location.reload()">Play Again</button>
            `;
        }, 1000);
    }
}

loadQuestion();
</script>

</body>
</html>
