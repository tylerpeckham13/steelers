<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tyler's Build & Blitz Sim</title>
    <style>
        body { background: #101820; color: #FFB81C; font-family: sans-serif; text-align: center; padding: 50px; }
        .sim-card { border: 5px solid #FFB81C; padding: 40px; border-radius: 20px; background: #222; display: inline-block; }
        #progress-container { width: 300px; height: 30px; background: #444; margin: 20px auto; border-radius: 15px; overflow: hidden; }
        #bar { height: 100%; width: 0%; background: #FFB81C; transition: width 0.4s; }
        button { background: #FFB81C; color: #101820; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="sim-card">
        <h1>BYU Construction Sim</h1>
        <p>Tyler Peckham, manage the Fountain Green stadium build!</p>
        
        <div id="progress-container"><div id="bar"></div></div>
        <p>Project Completion: <span id="percent">0</span>%</p>
        
        <button onclick="work()">Execute Project Phase</button>
        
        <p id="msg"></p>
        <br>
        <a href="index.html" style="color:white; text-decoration:none;">← Back to Main Page</a>
    </div>

    <script>
        let progress = 0;
        function work() {
            if (progress < 100) {
                progress += Math.floor(Math.random() * 20) + 5;
                if (progress > 100) progress = 100;
                document.getElementById('bar').style.width = progress + "%";
                document.getElementById('percent').innerText = progress;
                document.getElementById('msg').innerText = "Laying foundations and sending the blitz!";
                
                if (progress === 100) {
                    document.getElementById('msg').innerText = "🏗️ PROJECT FINISHED! The Blitzburgh Stadium is complete!";
                }
            }
        }
    </script>
</body>
</html>
