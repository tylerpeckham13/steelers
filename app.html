<!DOCTYPE html>
<html lang="en">
<head>
    <title>Blitzburgh Sack Simulator</title>
    <style>
        body { text-align: center; background: #101820; color: white; font-family: sans-serif; padding-top: 50px; }
        #game-box { border: 5px solid #FFB81C; display: inline-block; padding: 40px; border-radius: 20px; }
        .stat { font-size: 24px; margin: 10px; }
        button { background: #FFB81C; border: none; padding: 15px 25px; font-size: 18px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="game-box">
        <h1>Sack Simulator</h1>
        <p>Can you beat the '94 record of 55 sacks?</p>
        <div class="stat">Current Sacks: <span id="sackCount">0</span></div>
        <div class="stat">Games Left: <span id="gamesLeft">16</span></div>
        <button onclick="playGame()">Send the Blitz!</button>
        <p id="message"></p>
        <br>
        <a href="blitzburgh.html" style="color:#FFB81C;">Back to Main Page</a>
    </div>

    <script>
        let sacks = 0;
        let games = 16;

        function playGame() {
            if (games > 0) {
                let roundSacks = Math.floor(Math.random() * 6); // Random 0-5 sacks
                sacks += roundSacks;
                games--;
                document.getElementById('sackCount').innerText = sacks;
                document.getElementById('gamesLeft').innerText = games;
                
                if (games === 0) {
                    let msg = sacks >= 55 ? "LEGENDARY! You broke the record!" : "Good effort, but the '94 team is still King.";
                    document.getElementById('message').innerText = msg;
                }
            }
        }
    </script>
</body>
</html>
